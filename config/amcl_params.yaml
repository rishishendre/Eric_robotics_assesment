amcl:
  ros__parameters:

    use_sim_time: true

    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: scan

    min_particles: 500
    max_particles: 2000
   

    set_initial_pose: true

    initial_pose.x: 0.0
    initial_pose.y: 5.0
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0